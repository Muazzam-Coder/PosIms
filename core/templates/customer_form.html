{% extends 'base.html' %}

{% block title %}{{ title }} - Customers{% endblock %}

{% block content %}
<h1 class="mb-4">{{ title }}</h1>

<div class="row">
    <div class="col-md-6">
        <div class="card">
            <div class="card-body">
                <form method="POST" novalidate>
                    {% csrf_token %}
                    
                    {% for field in form %}
                        <div class="mb-3">
                            <label for="{{ field.id_for_label }}" class="form-label">
                                {{ field.label }}
                            </label>
                            {{ field }}
                            {% if field.errors %}
                                <div class="text-danger mt-2">
                                    {{ field.errors|join:", " }}
                                </div>
                            {% endif %}
                        </div>
                    {% endfor %}
                    
                    <button type="submit" class="btn btn-primary btn-lg w-100 btn-custom">
                        <i class="bi bi-check-circle"></i> Save
                    </button>
                    <a href="{% url 'customer_list' %}" class="btn btn-secondary w-100 mt-2">
                        <i class="bi bi-x-circle"></i> Cancel
                    </a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
